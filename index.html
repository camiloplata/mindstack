<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindStack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg2:#111111;--bg3:#181818;--border:#222222;--border2:#2a2a2a;--text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;--purple:#7F77DD;--purple2:#534AB7;--teal:#5DCAA5;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{padding:1.5rem 2rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);z-index:100;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:34px;height:34px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;}
.logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:7px 12px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;width:180px;}
.search-box input::placeholder{color:var(--text3);}
.stats-bar{display:flex;border-bottom:0.5px solid var(--border);}
.stat-item{flex:1;padding:1.25rem 2rem;border-right:0.5px solid var(--border);}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;}
.stat-label{font-size:12px;color:var(--text3);margin-top:2px;}
.featured-section{padding:2rem;border-bottom:0.5px solid var(--border);}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:1rem;}
.featured-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:1.75rem;display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center;}
.featured-tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--purple);border:0.5px solid var(--purple2);border-radius:20px;padding:3px 10px;margin-bottom:10px;}
.featured-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:600;line-height:1.3;margin-bottom:10px;}
.featured-desc{font-size:13px;color:var(--text2);line-height:1.7;}
.featured-badges{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;}
.badge-done{background:#1a1a2a;color:#AFA9EC;border:0.5px solid var(--purple2);}
.badge-audio{background:#0d2018;color:var(--teal);border:0.5px solid #0F6E56;}
.featured-actions{display:flex;gap:8px;margin-top:16px;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:opacity 0.15s;}
.btn:hover{opacity:0.85;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:0.5px solid var(--border2);}
.player{background:var(--bg);border:0.5px solid var(--border2);border-radius:12px;padding:14px 16px;}
.player-label{font-size:11px;color:var(--text3);margin-bottom:8px;}
.player-name{font-size:13px;color:var(--text2);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-bar{height:3px;background:var(--border2);border-radius:2px;margin-bottom:10px;cursor:pointer;}
.player-progress{height:100%;background:var(--purple);border-radius:2px;width:0%;transition:width 0.1s;}
.player-controls{display:flex;align-items:center;gap:10px;}
.play-btn{width:32px;height:32px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.play-btn svg{width:14px;height:14px;fill:#fff;}
.player-time{font-size:11px;color:var(--text3);font-family:monospace;flex:1;}
audio{display:none;}
.no-audio{background:var(--bg3);border:0.5px solid var(--border);border-radius:12px;padding:2rem;text-align:center;color:var(--text3);font-size:13px;}
.filters{padding:1.5rem 2rem;border-bottom:0.5px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border2);background:var(--bg2);color:#cccccc;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--purple);color:var(--text);}
.filter-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.courses-wrap{padding:0 2rem 3rem;}
.cat-section{margin-top:2rem;}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:10px;border-bottom:0.5px solid var(--border);}
.cat-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--text);}
.cat-count{font-size:12px;color:var(--text3);background:var(--bg3);border:0.5px solid var(--border);border-radius:12px;padding:2px 8px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.course-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:1.1rem;cursor:pointer;transition:border-color 0.15s,transform 0.15s;}
.course-card:hover{border-color:var(--purple);transform:translateY(-2px);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px;}
.card-desc{font-size:11px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-link{font-size:11px;color:var(--purple);display:flex;align-items:center;gap:4px;text-decoration:none;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;backdrop-filter:blur(4px);}
.detail-overlay.open{display:flex;align-items:flex-start;justify-content:flex-end;}
.detail-panel{width:min(600px,95vw);height:100vh;background:var(--bg2);border-left:0.5px solid var(--border2);overflow-y:auto;padding:2rem;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.detail-close{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:1.5rem;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;width:fit-content;}
.detail-cat{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--purple);margin-bottom:8px;}
.detail-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1.3;margin-bottom:12px;}
.detail-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1.5rem;}
.detail-section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;}
.subpage-list{display:flex;flex-direction:column;gap:8px;}
.subpage-item{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--text2);transition:border-color 0.15s;}
.subpage-item:hover{border-color:var(--purple);color:var(--text);}
.subpage-title{font-size:13px;color:var(--text);font-weight:500;flex:1;}
.detail-external{display:flex;gap:8px;margin-top:1.5rem;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:16px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text3);}
.notion-content{font-size:14px;color:var(--text2);line-height:1.8;}
.notion-content h1,.notion-content h2,.notion-content h3{font-family:'Syne',sans-serif;color:var(--text);margin:1.5rem 0 0.5rem;}
.notion-content p{margin-bottom:0.75rem;}
.notion-content ul,.notion-content ol{margin:0.5rem 0 0.5rem 1.5rem;}
.notion-content li{margin-bottom:4px;}
.notion-content blockquote{border-left:3px solid var(--purple);padding-left:1rem;color:var(--text3);margin:1rem 0;}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px;}
</style>
</head>
<body>
<header>
  <a class="logo" href="#">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div><div class="logo-name">MindStack</div><div class="logo-sub">biblioteca de aprendizaje</div></div>
  </a>
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar curso...">
  </div>
</header>
<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" style="color:#AFA9EC;" id="totalCourses">-</div><div class="stat-label">cursos</div></div>
  <div class="stat-item"><div class="stat-num" style="color:#5DCAA5;">4</div><div class="stat-label">categorias</div></div>
  <div class="stat-item"><div class="stat-num" style="color:#7F77DD;" id="totalPodcasts">-</div><div class="stat-label">podcasts</div></div>
</div>
<div class="featured-section" id="featuredSection" style="display:none;">
  <div class="section-label">destacado</div>
  <div class="featured-card">
    <div>
      <div class="featured-tag" id="featuredCat"></div>
      <div class="featured-title" id="featuredTitle"></div>
      <div class="featured-desc" id="featuredDesc"></div>
      <div class="featured-badges" id="featuredBadges"></div>
      <div class="featured-actions">
        <button class="btn btn-primary" id="featuredOpenBtn">Ver curso</button>
        <a class="btn btn-ghost" id="featuredCourseLink" href="#" target="_blank" style="display:none;">Ir a Platzi</a>
      </div>
    </div>
    <div>
      <div class="no-audio" id="featuredNoAudio">Podcast no disponible</div>
      <div class="player" id="featuredPlayer" style="display:none;">
        <div class="player-label">podcast del curso</div>
        <div class="player-name" id="featuredPlayerName"></div>
        <div class="player-bar" id="featuredBar"><div class="player-progress" id="featuredProg"></div></div>
        <div class="player-controls">
          <button class="play-btn" id="featuredPlayBtn"><svg id="featuredPlayIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>
          <span class="player-time" id="featuredTime">0:00 / 0:00</span>
        </div>
        <audio id="featuredAudio" preload="none" crossorigin="anonymous"></audio>
      </div>
    </div>
  </div>
</div>
<div class="filters">
  <button class="filter-btn active" onclick="filterCat('all',this)">todos</button>
  <button class="filter-btn" onclick="filterCat('ia',this)">inteligencia artificial</button>
  <button class="filter-btn" onclick="filterCat('tools',this)">herramientas</button>
  <button class="filter-btn" onclick="filterCat('pro',this)">desarrollo profesional</button>
  <button class="filter-btn" onclick="filterCat('tech',this)">tecnologia y datos</button>
</div>
<div class="courses-wrap" id="coursesWrap">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Cargando cursos...</div></div>
</div>
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>
<script>
var WORKER='https://mindstack-api.skmiloplata.workers.dev';
var CATS={
  ia:{label:'inteligencia artificial',icon:'🤖',color:'#AFA9EC',kw:['ia','inteligencia artificial','claude','chatgpt','gemini','prompt','copilot','tips','trucos','pensamiento critico']},
  tools:{label:'herramientas y productividad',icon:'🛠️',color:'#5DCAA5',kw:['notion','teams','power apps','power automate','microsoft 365','gestion del tiempo']},
  pro:{label:'desarrollo profesional',icon:'💼',color:'#F0997B',kw:['linkedin','posicionamiento','profesional','optimizacion']},
  tech:{label:'tecnologia y datos',icon:'💻',color:'#EF9F27',kw:['estadistica','ingenieria de software','pensamiento logico','fundamentos']}
};
var allCourses=[],currentAudio=null,currentCourse=null;

function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function getCat(name){
  var n=norm(name);
  var keys=Object.keys(CATS);
  for(var i=0;i<keys.length;i++){
    var kw=CATS[keys[i]].kw;
    for(var j=0;j<kw.length;j++){if(n.indexOf(kw[j])>=0)return keys[i];}
  }
  return 'tech';
}

function driveUrl(url){
  if(!url)return null;
  var m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return 'https://drive.google.com/uc?export=open&id='+m[1];
  if(url.indexOf('export=download')>=0)return url.replace('export=download','export=open');
  return url;
}

function fmt(s){
  if(!s||isNaN(s)||!isFinite(s))return '0:00';
  return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0');
}

function setupPlayer(audio,playBtn,iconEl,bar,prog,timeEl){
  playBtn.onclick=function(){
    if(currentAudio&&currentAudio!==audio)currentAudio.pause();
    if(audio.paused){
      audio.play().catch(function(e){
        timeEl.textContent='No disponible';
        console.log('Audio error:',e);
      });
    } else {
      audio.pause();
    }
    currentAudio=audio;
  };
  audio.ontimeupdate=function(){
    var p=audio.duration?(audio.currentTime/audio.duration*100):0;
    prog.style.width=p+'%';
    timeEl.textContent=fmt(audio.currentTime)+' / '+fmt(audio.duration);
  };
  audio.onplay=function(){iconEl.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';};
  audio.onpause=function(){iconEl.innerHTML='<polygon points="5,3 19,12 5,21"/>';};
  audio.onerror=function(){timeEl.textContent='No disponible';};
  bar.onclick=function(e){
    if(!audio.duration)return;
    var r=bar.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
  };
}

function fetchCourses(){
  fetch(WORKER+'/courses')
    .then(function(r){return r.json();})
    .then(function(data){
      allCourses=(data.results||[])
        .filter(function(p){return p.properties&&p.properties.Name&&p.properties.Name.title&&p.properties.Name.title.length>0;})
        .map(function(p){
          var pr=p.properties;
          return{
            id:p.id,
            title:(pr.Name.title[0]&&pr.Name.title[0].plain_text)||'Sin titulo',
            desc:(pr.Description&&pr.Description.rich_text&&pr.Description.rich_text[0]&&pr.Description.rich_text[0].plain_text)||'',
            podcast:(pr.Podcast&&pr.Podcast.url)||null,
            curso:(pr.Curso&&pr.Curso.url)||null,
            status:(pr.Status&&pr.Status.status&&pr.Status.status.name)||'',
            cat:getCat((pr.Name.title[0]&&pr.Name.title[0].plain_text)||'')
          };
        });
      document.getElementById('totalCourses').textContent=allCourses.length;
      document.getElementById('totalPodcasts').textContent=allCourses.filter(function(c){return c.podcast;}).length;
      renderFeatured();
      renderCourses(allCourses);
    })
    .catch(function(){
      document.getElementById('coursesWrap').innerHTML='<div class="empty">No se pudieron cargar los cursos.</div>';
    });
}

function renderFeatured(){
  var f=null;
  for(var i=0;i<allCourses.length;i++){if(allCourses[i].podcast){f=allCourses[i];break;}}
  if(!f&&allCourses.length)f=allCourses[0];
  if(!f)return;
  document.getElementById('featuredSection').style.display='block';
  var cat=CATS[f.cat];
  document.getElementById('featuredCat').textContent=cat.icon+' '+cat.label;
  document.getElementById('featuredTitle').textContent=f.title;
  document.getElementById('featuredDesc').textContent=f.desc;
  document.getElementById('featuredOpenBtn').onclick=function(){openDetail(f);};
  var badges='';
  if(f.status==='Finished')badges+='<span class="badge badge-done">finalizado</span>';
  if(f.podcast)badges+='<span class="badge badge-audio">podcast</span>';
  document.getElementById('featuredBadges').innerHTML=badges;
  if(f.curso){var l=document.getElementById('featuredCourseLink');l.href=f.curso;l.style.display='inline-flex';}
  if(f.podcast){
    document.getElementById('featuredPlayer').style.display='block';
    document.getElementById('featuredNoAudio').style.display='none';
    var audio=document.getElementById('featuredAudio');
    audio.src=driveUrl(f.podcast);
    document.getElementById('featuredPlayerName').textContent=f.title;
    setupPlayer(audio,document.getElementById('featuredPlayBtn'),document.getElementById('featuredPlayIcon'),document.getElementById('featuredBar'),document.getElementById('featuredProg'),document.getElementById('featuredTime'));
  }
}

function renderCourses(courses){
  var wrap=document.getElementById('coursesWrap');
  if(!courses.length){wrap.innerHTML='<div class="empty">No se encontraron cursos.</div>';return;}
  var grouped={};
  courses.forEach(function(c){if(!grouped[c.cat])grouped[c.cat]=[];grouped[c.cat].push(c);});
  wrap.innerHTML='';
  ['ia','tools','pro','tech'].forEach(function(key){
    if(!grouped[key])return;
    var cat=CATS[key];
    var sec=document.createElement('div');
    sec.className='cat-section';
    var hdr=document.createElement('div');
    hdr.className='cat-header';
    hdr.innerHTML='<span style="font-size:18px">'+cat.icon+'</span><span class="cat-name">'+cat.label+'</span><span class="cat-count">'+grouped[key].length+' cursos</span>';
    sec.appendChild(hdr);
    var grid=document.createElement('div');
    grid.className='cards-grid';
    grouped[key].forEach(function(c){
      var card=document.createElement('div');
      card.className='course-card';
      var badges='';
      if(c.podcast)badges+='<span class="badge badge-audio">podcast</span>';
      if(c.status==='Finished')badges+='<span class="badge badge-done">✓</span>';
      card.innerHTML='<div class="card-top"><div class="card-icon" style="background:'+cat.color+'22;">'+cat.icon+'</div><div class="card-badges">'+badges+'</div></div><div class="card-title">'+c.title+'</div><div class="card-desc">'+(c.desc||'Ver contenido')+'</div><div class="card-footer"><button class="card-link">ver lecturas</button>'+(c.curso?'<a class="card-link" href="'+c.curso+'" target="_blank" onclick="event.stopPropagation()">Platzi</a>':'')+'</div>';
      (function(course){
        card.onclick=function(){openDetail(course);};
        card.querySelector('button.card-link').onclick=function(e){e.stopPropagation();openDetail(course);};
      })(c);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    wrap.appendChild(sec);
  });
}

function filterCat(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderCourses(cat==='all'?allCourses:allCourses.filter(function(c){return c.cat===cat;}));
}

document.getElementById('searchInput').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase();
  renderCourses(!q?allCourses:allCourses.filter(function(c){return c.title.toLowerCase().indexOf(q)>=0||c.desc.toLowerCase().indexOf(q)>=0;}));
});

function openDetail(course){
  if(!course)return;
  currentCourse=course;
  var cat=CATS[course.cat];
  var panel=document.getElementById('detailPanel');
  panel.innerHTML='';

  var closeBtn=document.createElement('button');
  closeBtn.className='detail-close';
  closeBtn.textContent='← Volver';
  closeBtn.onclick=closeDetailPanel;
  panel.appendChild(closeBtn);

  var catEl=document.createElement('div');
  catEl.className='detail-cat';
  catEl.textContent=cat.icon+' '+cat.label;
  panel.appendChild(catEl);

  var titleEl=document.createElement('div');
  titleEl.className='detail-title';
  titleEl.textContent=course.title;
  panel.appendChild(titleEl);

  var descEl=document.createElement('div');
  descEl.className='detail-desc';
  descEl.textContent=course.desc;
  panel.appendChild(descEl);

  if(course.podcast){
    var pw=document.createElement('div');
    pw.style.marginBottom='1.5rem';
    pw.innerHTML='<div class="detail-section-title">podcast del curso</div><div class="player"><div class="player-bar" id="dBar"><div class="player-progress" id="dProg"></div></div><div class="player-controls"><button class="play-btn" id="dPlayBtn"><svg id="dPlayIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button><span class="player-time" id="dTime">0:00 / 0:00</span></div><audio id="dAudio" preload="none" crossorigin="anonymous"></audio></div>';
    panel.appendChild(pw);
    var da=document.getElementById('dAudio');
    da.src=driveUrl(course.podcast);
    setupPlayer(da,document.getElementById('dPlayBtn'),document.getElementById('dPlayIcon'),document.getElementById('dBar'),document.getElementById('dProg'),document.getElementById('dTime'));
  }

  var subWrap=document.createElement('div');
  subWrap.style.marginBottom='1.5rem';
  subWrap.innerHTML='<div class="detail-section-title">contenido del curso</div><div class="loading"><div class="spinner"></div></div>';
  panel.appendChild(subWrap);

  if(course.curso){
    var ext=document.createElement('div');
    ext.className='detail-external';
    var lnk=document.createElement('a');
    lnk.className='btn btn-primary';
    lnk.href=course.curso;
    lnk.target='_blank';
    lnk.textContent='Ir al curso';
    ext.appendChild(lnk);
    panel.appendChild(ext);
  }

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow='hidden';

  var cid=course.id;
  fetch(WORKER+'/blocks/'+cid.replace(/-/g,''))
    .then(function(r){return r.json();})
    .then(function(data){
      var subpages=(data.results||[]).filter(function(b){return b.type==='child_page';});
      if(subpages.length){
        var list=document.createElement('div');
        list.className='subpage-list';
        subpages.forEach(function(sp){
          var t=(sp.child_page&&sp.child_page.title)||'Sin titulo';
          var item=document.createElement('div');
          item.className='subpage-item';
          item.innerHTML='<span>📄</span><div class="subpage-title">'+t+'</div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
          (function(spId,spTitle,courseId){
            item.onclick=function(){openSubpage(spId,spTitle,courseId);};
          })(sp.id,t,cid);
          list.appendChild(item);
        });
        subWrap.innerHTML='<div class="detail-section-title">contenido del curso</div>';
        subWrap.appendChild(list);
      } else {
        subWrap.innerHTML='';
      }
    })
    .catch(function(){subWrap.innerHTML='';});
}

function openSubpage(pageId,title,courseId){
  var panel=document.getElementById('detailPanel');
  panel.innerHTML='';

  var backBtn=document.createElement('button');
  backBtn.className='detail-close';
  backBtn.textContent='← Volver al curso';
  (function(cid){
    backBtn.onclick=function(){
      var c=null;
      for(var i=0;i<allCourses.length;i++){if(allCourses[i].id===cid){c=allCourses[i];break;}}
      if(c)openDetail(c);
      else if(currentCourse)openDetail(currentCourse);
    };
  })(courseId);
  panel.appendChild(backBtn);

  var titleEl=document.createElement('div');
  titleEl.className='detail-title';
  titleEl.style.cssText='font-size:18px;margin-bottom:1.5rem;';
  titleEl.textContent=title;
  panel.appendChild(titleEl);

  var loading=document.createElement('div');
  loading.className='loading';
  loading.innerHTML='<div class="spinner"></div><div class="loading-text">Cargando...</div>';
  panel.appendChild(loading);

  fetch(WORKER+'/blocks/'+pageId.replace(/-/g,''))
    .then(function(r){return r.json();})
    .then(function(data){
      loading.remove();
      var content=document.createElement('div');
      content.className='notion-content';
      content.innerHTML=renderBlocks(data.results||[]);
      panel.appendChild(content);
    })
    .catch(function(){loading.innerHTML='<div class="empty">No se pudo cargar.</div>';});
}

function renderBlocks(blocks){
  return blocks.map(function(b){
    function txt(arr){
      return(arr||[]).map(function(r){
        var t=r.plain_text||'';
        if(r.annotations&&r.annotations.bold)t='<strong>'+t+'</strong>';
        if(r.annotations&&r.annotations.italic)t='<em>'+t+'</em>';
        if(r.annotations&&r.annotations.code)t='<code style="background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:12px;">'+t+'</code>';
        if(r.href)t='<a href="'+r.href+'" target="_blank" style="color:var(--purple);">'+t+'</a>';
        return t;
      }).join('');
    }
    switch(b.type){
      case 'heading_1':return '<h1>'+txt(b.heading_1&&b.heading_1.rich_text)+'</h1>';
      case 'heading_2':return '<h2>'+txt(b.heading_2&&b.heading_2.rich_text)+'</h2>';
      case 'heading_3':return '<h3>'+txt(b.heading_3&&b.heading_3.rich_text)+'</h3>';
      case 'paragraph':return '<p>'+txt(b.paragraph&&b.paragraph.rich_text)+'</p>';
      case 'bulleted_list_item':return '<ul><li>'+txt(b.bulleted_list_item&&b.bulleted_list_item.rich_text)+'</li></ul>';
      case 'numbered_list_item':return '<ol><li>'+txt(b.numbered_list_item&&b.numbered_list_item.rich_text)+'</li></ol>';
      case 'quote':return '<blockquote>'+txt(b.quote&&b.quote.rich_text)+'</blockquote>';
      case 'divider':return '<hr style="border:none;border-top:0.5px solid var(--border);margin:1rem 0;">';
      case 'callout':return '<div style="background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;">'+txt(b.callout&&b.callout.rich_text)+'</div>';
      case 'image':
        var src=(b.image&&b.image.file&&b.image.file.url)||(b.image&&b.image.external&&b.image.external.url)||'';
        return src?'<img src="'+src+'" style="width:100%;border-radius:8px;margin:8px 0;">':'';
      default:return '';
    }
  }).join('');
}

document.getElementById('detailOverlay').onclick=function(e){
  if(e.target===document.getElementById('detailOverlay'))closeDetailPanel();
};

function closeDetailPanel(){
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
}

fetchCourses();
</script>
</body>
</html>
